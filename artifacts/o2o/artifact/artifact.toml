kind = "mobile"
previewPath = "/"
title = "O2O – Buy · Sell · Bid"
version = "1.0.0"
id = "artifacts/o2o"
router = "react-native"

[[integratedSkills]]
name = "react-native"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "react-native"
paths = [ "/" ]
localPort = 24186

[services.development]
run = "pnpm --filter @workspace/o2o run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/o2o", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/o2o", "run", "serve" ]

[services.env]
PORT = "24186"
BASE_PATH = "/"
